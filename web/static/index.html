<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkLens — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #00ff88;
      --accent2:  #0066ff;
      --warn:     #ff4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: var(--sans); font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 6px; font-family: var(--mono); font-size: .8rem; cursor: pointer; transition: all .15s; border: none; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    .btn-primary:hover { background: #00cc6e; }
    .btn-danger { background: transparent; color: var(--warn); border: 1px solid var(--warn); }
    .btn-danger:hover { background: var(--warn); color: #fff; }

    /* ── VIEWS ── */
    #app { min-height: calc(100vh - 57px); }
    .view { display: none; }
    .view.active { display: block; }

    /* ── AUTH SCREEN ── */
    #auth-view {
      display: none; min-height: calc(100vh - 57px);
      align-items: center; justify-content: center;
    }
    #auth-view.active { display: flex; }
    .auth-box {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px;
    }
    .auth-box h2 { font-family: var(--sans); font-size: 1.5rem; margin-bottom: 8px; }
    .auth-box p { color: var(--muted); font-size: .82rem; margin-bottom: 28px; }
    .tab-switch { display: flex; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 8px 16px; background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: var(--mono); font-size: .82rem; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    .field input {
      width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: .85rem;
      outline: none; transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }
    .auth-error { color: var(--warn); font-size: .78rem; margin-bottom: 12px; display: none; }

    /* ── DASHBOARD ── */
    #dashboard-view { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .dash-header h1 { font-family: var(--sans); font-size: 1.8rem; font-weight: 800; }
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-value { font-family: var(--sans); font-size: 2rem; font-weight: 800; color: var(--accent); }

    /* Create URL form */
    .create-form {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 24px; margin-bottom: 32px;
    }
    .create-form h3 { font-size: .9rem; font-weight: 500; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .create-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .create-row .field { flex: 1; min-width: 200px; margin-bottom: 0; }
    .create-row .field:first-child { flex: 2; }

    /* URL table */
    .url-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .table-header h3 { font-size: .85rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 20px; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
    td { padding: 14px 20px; font-size: .82rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .short-code { color: var(--accent); font-weight: 500; cursor: pointer; }
    .short-code:hover { text-decoration: underline; }
    .original-url { color: var(--muted); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .72rem; }
    .badge-on { background: rgba(0,255,136,.1); color: var(--accent); border: 1px solid rgba(0,255,136,.2); }
    .badge-off { background: rgba(255,68,68,.1); color: var(--warn); border: 1px solid rgba(255,68,68,.2); }
    .row-actions { display: flex; gap: 8px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: .85rem; padding: 4px 8px; border-radius: 4px; transition: .15s; font-family: var(--mono); }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn.del:hover { color: var(--warn); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .big { font-size: 2rem; margin-bottom: 8px; }

    /* ── ANALYTICS PANEL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 700px; max-height: 85vh;
      overflow-y: auto; padding: 32px;
    }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-head h2 { font-family: var(--sans); font-size: 1.2rem; font-weight: 800; }
    .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .analytics-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .analytics-card h4 { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: .8rem; }
    .stat-row .bar-wrap { flex: 1; margin: 0 12px; background: var(--border); border-radius: 2px; height: 4px; align-self: center; }
    .stat-row .bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
    .big-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .big-num { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .big-num .n { font-family: var(--sans); font-size: 2rem; font-weight: 800; color: var(--accent); }
    .big-num .l { font-size: .72rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px;
      font-size: .82rem; opacity: 0; pointer-events: none; transition: opacity .2s;
      z-index: 999; min-width: 220px;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error { border-color: var(--warn); color: var(--warn); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <div class="logo">Link<span>Lens</span></div>
  <div class="nav-actions" id="nav-actions">
    <span id="nav-user" style="font-size:.8rem;color:var(--muted)"></span>
    <button class="btn btn-ghost" id="btn-logout" style="display:none" onclick="logout()">Logout</button>
    <button class="btn btn-primary" id="btn-open-auth" onclick="showAuth()">Get Started →</button>
  </div>
</nav>

<div id="app">

  <!-- AUTH VIEW -->
  <div id="auth-view" class="view">
    <div class="auth-box">
      <div class="tab-switch">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <div id="login-form">
        <div class="auth-error" id="login-error"></div>
        <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" /></div>
        <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="login()">Sign In</button>
      </div>

      <div id="register-form" style="display:none">
        <div class="auth-error" id="reg-error"></div>
        <div class="field"><label>Name</label><input type="text" id="reg-name" placeholder="Your name" /></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" /></div>
        <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="Min 8 characters" /></div>
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="register()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="view">
    <div class="stats-bar" id="stats-bar" style="max-width:1100px;margin:24px auto 0;padding:0 24px">
      <div class="stat-card"><div class="stat-label">Total Links</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Clicks</div><div class="stat-value" id="stat-clicks">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Links</div><div class="stat-value" id="stat-active">—</div></div>
    </div>

    <div style="max-width:1100px;margin:0 auto;padding:24px">
      <div class="create-form">
        <h3>Shorten a URL</h3>
        <div class="create-row">
          <div class="field"><label>Long URL</label><input type="url" id="input-url" placeholder="https://example.com/very/long/url" /></div>
          <div class="field"><label>Custom Code (optional)</label><input type="text" id="input-code" placeholder="my-brand" /></div>
          <div class="field"><label>Title</label><input type="text" id="input-title" placeholder="Campaign name" /></div>
          <button class="btn btn-primary" onclick="createURL()">Shorten →</button>
        </div>
      </div>

      <div class="url-table-wrap">
        <div class="table-header">
          <h3>Your Links</h3>
          <button class="btn btn-ghost" onclick="loadURLs()" style="font-size:.75rem">↻ Refresh</button>
        </div>
        <div id="url-table-body">
          <div class="empty-state"><div class="big">🔗</div>No links yet. Create your first one above.</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- #app -->

<!-- ANALYTICS MODAL -->
<div class="modal-overlay" id="analytics-modal" onclick="closeAnalytics(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>📊 Link Analytics</h2>
      <button class="btn btn-ghost" onclick="closeAnalytics()">✕ Close</button>
    </div>
    <div id="analytics-content"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
const API = '';  // Same origin
let token = localStorage.getItem('ll_token') || '';
let urls  = [];

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (token) {
    showDashboard();
    loadURLs();
  } else {
    showAuth();
  }
});

// ── Views ──────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-view').classList.add('active');
  document.getElementById('dashboard-view').classList.remove('active');
  document.getElementById('btn-open-auth').style.display = '';
  document.getElementById('btn-logout').style.display = 'none';
}

function showDashboard() {
  document.getElementById('auth-view').classList.remove('active');
  document.getElementById('dashboard-view').classList.add('active');
  document.getElementById('btn-open-auth').style.display = 'none';
  document.getElementById('btn-logout').style.display = '';
  const email = parseJWT(token)?.email;
  document.getElementById('nav-user').textContent = email || '';
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

// ── Auth ───────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  try {
    const res = await apiFetch('/api/auth/login', 'POST', { email, password: pass });
    token = res.access_token;
    localStorage.setItem('ll_token', token);
    showDashboard();
    loadURLs();
    toast('Welcome back!', 'success');
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';

  try {
    const res = await apiFetch('/api/auth/register', 'POST', { name, email, password: pass });
    token = res.access_token;
    localStorage.setItem('ll_token', token);
    showDashboard();
    loadURLs();
    toast('Account created!', 'success');
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}

function logout() {
  token = ''; localStorage.removeItem('ll_token');
  showAuth();
  toast('Logged out');
}

// ── URLs ───────────────────────────────────────────────────
async function loadURLs() {
  try {
    const res = await apiFetch('/api/urls?page=1&page_size=50', 'GET');
    urls = res.data || [];
    renderURLTable(urls);
    updateStats(urls);
  } catch(e) {
    toast('Failed to load URLs: ' + e.message, 'error');
  }
}

async function createURL() {
  const original = document.getElementById('input-url').value.trim();
  const code     = document.getElementById('input-code').value.trim();
  const title    = document.getElementById('input-title').value.trim();
  if (!original) { toast('Please enter a URL', 'error'); return; }

  const body = { original_url: original };
  if (code)  body.custom_code = code;
  if (title) body.title = title;

  try {
    const res = await apiFetch('/api/urls', 'POST', body);
    document.getElementById('input-url').value = '';
    document.getElementById('input-code').value = '';
    document.getElementById('input-title').value = '';
    await loadURLs();
    copyToClipboard(res.short_url);
    toast('Shortened! Short URL copied ✓', 'success');
  } catch(e) {
    toast(e.message, 'error');
  }
}

async function deleteURL(id) {
  if (!confirm('Delete this link? All analytics will be lost.')) return;
  try {
    await apiFetch('/api/urls/' + id, 'DELETE');
    toast('Link deleted', 'success');
    loadURLs();
  } catch(e) {
    toast(e.message, 'error');
  }
}

async function openAnalytics(id) {
  document.getElementById('analytics-modal').classList.add('open');
  document.getElementById('analytics-content').innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';

  try {
    const stats = await apiFetch('/api/analytics/' + id, 'GET');
    document.getElementById('analytics-content').innerHTML = renderAnalytics(stats);
  } catch(e) {
    document.getElementById('analytics-content').innerHTML = '<p style="color:var(--warn)">Failed to load analytics</p>';
  }
}

function closeAnalytics(e) {
  if (!e || e.target === document.getElementById('analytics-modal'))
    document.getElementById('analytics-modal').classList.remove('open');
}

// ── Render ─────────────────────────────────────────────────
function renderURLTable(list) {
  if (!list || list.length === 0) {
    document.getElementById('url-table-body').innerHTML =
      '<div class="empty-state"><div class="big">🔗</div>No links yet. Create your first one above.</div>';
    return;
  }

  const rows = list.map(u => {
    const short = window.location.origin + '/' + u.short_code;
    return `
    <tr>
      <td><span class="short-code" onclick="copyToClipboard('${short}')" title="Click to copy">${u.short_code}</span></td>
      <td><span class="original-url" title="${u.original_url}">${u.original_url}</span></td>
      <td>${u.title || '<span style="color:var(--muted)">—</span>'}</td>
      <td><strong style="color:var(--accent)">${u.click_count}</strong></td>
      <td><span class="badge ${u.is_active ? 'badge-on' : 'badge-off'}">${u.is_active ? 'active' : 'off'}</span></td>
      <td class="row-actions">
        <button class="icon-btn" onclick="copyToClipboard('${short}')" title="Copy">📋</button>
        <button class="icon-btn" onclick="openAnalytics('${u.id}')" title="Analytics">📊</button>
        <button class="icon-btn del" onclick="deleteURL('${u.id}')" title="Delete">🗑</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('url-table-body').innerHTML = `
    <table>
      <thead><tr>
        <th>Short Code</th><th>Original URL</th><th>Title</th>
        <th>Clicks</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function updateStats(list) {
  const total  = list.length;
  const clicks = list.reduce((s, u) => s + (u.click_count || 0), 0);
  const active = list.filter(u => u.is_active).length;
  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-clicks').textContent = clicks;
  document.getElementById('stat-active').textContent = active;
}

function renderAnalytics(s) {
  const barList = (items, total) => (items || []).map(i => {
    const pct = total > 0 ? Math.round(i.count / total * 100) : 0;
    return `<div class="stat-row">
      <span style="width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.label}</span>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <span style="color:var(--muted);width:40px;text-align:right">${i.count}</span>
    </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:.8rem">No data</div>';

  return `
  <div class="big-nums">
    <div class="big-num"><div class="n">${s.total_clicks}</div><div class="l">Total Clicks</div></div>
    <div class="big-num"><div class="n">${s.unique_clicks}</div><div class="l">Unique Visitors</div></div>
  </div>
  <div class="analytics-grid">
    <div class="analytics-card"><h4>By Country</h4>${barList(s.by_country, s.total_clicks)}</div>
    <div class="analytics-card"><h4>By Device</h4>${barList(s.by_device, s.total_clicks)}</div>
    <div class="analytics-card"><h4>By Browser</h4>${barList(s.by_browser, s.total_clicks)}</div>
    <div class="analytics-card"><h4>Top Referers</h4>${barList(s.top_referers, s.total_clicks)}</div>
  </div>`;
}

// ── Utils ──────────────────────────────────────────────────
async function apiFetch(path, method, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
  return data;
}

function parseJWT(t) {
  try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; }
}

function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => toast('Copied!', 'success'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';

  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand('copy');
    toast('Copied!', 'success');
  } catch (err) {
    toast('Failed to copy', 'error');
  }

  document.body.removeChild(textarea);
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2500);
}
</script>
